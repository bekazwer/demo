                cell.className = "maze-cell path";
              }
              grid.appendChild(cell);
            }
          }
        },

        move: function (dr, dc) {
          if (this.won) return;
          var nr = this.row + dr,
            nc = this.col + dc;
          if (nr < 0 || nr >= this.R || nc < 0 || nc >= this.C) return;
          if (this.MAP[nr][nc] === 1) {
            playTone(180, 0.05, 0, "square");
            return;
          }
          this.row = nr;
          this.col = nc;
          this.steps++;
          document.getElementById("maze-steps").textContent = this.steps;
          playTone(440, 0.04);
          this.render();
          if (nr === 10 && nc === 10) this._win();
        },

        _win: function () {
          this.won = true;
          document.getElementById("maze-status").textContent = "НАШЁЛ! ♥";
          document.querySelectorAll(".maze-cell").forEach(function (c) {
            c.classList.add("win-cell");
          });
          this._removeControls();
          setTimeout(function () {
            showKeyWon(3);
          }, 1300);
        },

        _setupControls: function () {
          this._removeControls();
          var self = this;
          this._kh = function (e) {
            var map = {
              ArrowUp: [-1, 0],
              ArrowDown: [1, 0],
              ArrowLeft: [0, -1],
              ArrowRight: [0, 1],
            };
            if (map[e.key]) {
              e.preventDefault();
              self.move(map[e.key][0], map[e.key][1]);
            }
          };
          this._ts = function (e) {
            self._sx = e.changedTouches[0].clientX;
            self._sy = e.changedTouches[0].clientY;
          };
          this._te = function (e) {
            var dx = e.changedTouches[0].clientX - self._sx;
            var dy = e.changedTouches[0].clientY - self._sy;
            if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
            if (Math.abs(dx) > Math.abs(dy)) self.move(0, dx > 0 ? 1 : -1);
            else self.move(dy > 0 ? 1 : -1, 0);
          };
          document.addEventListener("keydown", this._kh);
          var g = document.getElementById("game-4");
          g.addEventListener("touchstart", this._ts, { passive: true });
          g.addEventListener("touchend", this._te, { passive: true });
        },

        _removeControls: function () {
          if (this._kh) document.removeEventListener("keydown", this._kh);
          var g = document.getElementById("game-4");
          if (g && this._ts) g.removeEventListener("touchstart", this._ts);
          if (g && this._te) g.removeEventListener("touchend", this._te);
          this._kh = this._ts = this._te = null;
        },
      };

      // ============================================================
      // ИГРА 5 — СЛОВО
      // ============================================================
      var wordGame = {
        word: "",
        letters: [],
        answer: [],
        won: false,

        init: function () {
          this.won = false;
          this.word = (data.secretWord || "СЛОВО").toUpperCase();
          var arr = this.word.split("").map(function (ch, i) {
            return { ch: ch, id: i, placed: false };
          });
          // Shuffle
          for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = arr[i];
            arr[i] = arr[j];
            arr[j] = t;
          }
          // Ensure not already solved
          if (
            arr.length > 1 &&
            arr.every(function (l, i) {
              return l.ch === this.word[i];
            }, this)
          ) {
            var t2 = arr[0];
            arr[0] = arr[1];
            arr[1] = t2;
          }
          this.letters = arr;
          this.answer = new Array(this.word.length).fill(null);
          document.getElementById("word-hint").textContent = "";
          document.getElementById("word-status").textContent = "";
          document.getElementById("word-status").className = "word-status";
          this._renderBank();
          this._renderSlots();
        },

        _renderBank: function () {
          var bank = document.getElementById("word-bank");
          bank.innerHTML = "";
          var self = this;
          this.letters.forEach(function (l) {
            if (l.placed) return;
            var tile = document.createElement("div");
            tile.className = "letter-tile";
            tile.textContent = l.ch;
            tile.addEventListener("click", function () {
              self._fromBank(l.id);
            });
            bank.appendChild(tile);
          });
        },

        _renderSlots: function () {
          var container = document.getElementById("word-slots");
          container.innerHTML = "";
          var self = this;
          this.answer.forEach(function (lid, si) {
            var slot = document.createElement("div");
            var letter =
              lid !== null
                ? self.letters.find(function (l) {
                    return l.id === lid;
                  })
                : null;
            slot.className = "letter-slot" + (letter ? " filled" : "");
            slot.textContent = letter ? letter.ch : "";
            if (letter)
              slot.addEventListener("click", function () {
                self._fromSlot(si);
              });
            container.appendChild(slot);
          });
        },

        _fromBank: function (lid) {
          if (this.won) return;
          var next = this.answer.indexOf(null);
          if (next === -1) return;
          this.letters.find(function (l) {
            return l.id === lid;
          }).placed = true;
          this.answer[next] = lid;
          playTone(440, 0.06);
          this._renderBank();
          this._renderSlots();
          if (this.answer.indexOf(null) === -1) {
            var self = this;
            setTimeout(function () {
              self._check();
            }, 120);
          }
        },

        _fromSlot: function (si) {
          if (this.won) return;
          var lid = this.answer[si];
          if (lid === null) return;
          this.letters.find(function (l) {
            return l.id === lid;
          }).placed = false;
          this.answer[si] = null;
          playTone(330, 0.06);
          this._renderBank();
          this._renderSlots();
        },

        _check: function () {
          var self = this;
          var formed = this.answer
            .map(function (id) {
              return self.letters.find(function (l) {
                return l.id === id;
              }).ch;
            })
            .join("");
          if (formed === this.word) {
            this.won = true;
            document.querySelectorAll(".letter-slot").forEach(function (s) {
              s.classList.add("correct-slot");
            });
            document.getElementById("word-status").textContent = "ВЕРНО!";
            document.getElementById("word-status").className =
              "word-status correct-text";
            playTone(660, 0.1, 0);
            playTone(784, 0.1, 0.12);
            playTone(1047, 0.22, 0.25);
            setTimeout(function () {
              showKeyWon(4);
            }, 1400);
          } else {
            document.querySelectorAll(".letter-slot").forEach(function (s) {
              s.classList.add("wrong-slot");
            });
            document.getElementById("word-status").textContent =
              "НЕ ТАК — ПОПРОБУЙ ЕЩЁ";
            document.getElementById("word-status").className =
              "word-status wrong-text";
            playTone(200, 0.3, 0, "sawtooth");
            setTimeout(function () {
              self.reset();
            }, 900);
          }
        },

        hint: function () {
          document.getElementById("word-hint").textContent =
            data.secretWordHint || "";
        },

        reset: function () {
          this.letters.forEach(function (l) {
            l.placed = false;
          });
          this.answer = new Array(this.word.length).fill(null);
          document.getElementById("word-status").textContent = "";
          document.getElementById("word-status").className = "word-status";
          this._renderBank();
          this._renderSlots();
        },
      };

      // ============================================================
      // ИГРА 6 — ЛЮБОВЬ
      // ============================================================
      var loveGame = {
        count: 0,
        scale: 1.0,
        init: function () {
          this.count = 0;
          this.scale = 1.0;
          document.getElementById("love-counter").textContent = "0";
          document.getElementById("love-extra").textContent = "";
          document.getElementById("love-done-btn").style.display = "none";
          var btn = document.getElementById("love-heart-btn");
          btn.classList.remove("exploding");
          btn.style.visibility = "";
          btn.style.pointerEvents = "";
          btn.style.transform = "";
        },

        tap: function (btn) {
          if (this.count >= 100) return;
          this.count++;
          document.getElementById("love-counter").textContent = this.count;
          playTone(300 + (this.count - 1) * 30, 0.1, 0, "sine");
          this.scale = Math.min(2.0, 1.0 + this.count * 0.05);
          btn.style.transform = "scale(" + this.scale + ")";
          if (this.count < 100) {
            this._burst(btn, 6);
          } else {
            this._explode(btn);
          }
        },

        _explode: function (btn) {
          // Boom sounds: low thuds then ascending celebration
          playTone(180, 0.45, 0, "sawtooth");
          playTone(130, 0.55, 0.07, "sawtooth");
          playTone(90, 0.65, 0.16, "sawtooth");
          [523, 659, 784, 880, 1047, 1319].forEach(function (f, i) {
            playTone(f, 0.18, 0.38 + i * 0.09, "sine");
          });
          // Scale-up then burst animation
          btn.classList.add("exploding");
          btn.style.pointerEvents = "none";
          // Shower of hearts in all directions
          this._burst(btn, 30);
          setTimeout(function () {
            btn.style.visibility = "hidden";
            document.getElementById("love-done-btn").style.display =
              "inline-block";
          }, 880);
        },

        _burst: function (btn, n) {
          n = n || 6;
          var rect = btn.getBoundingClientRect();
          var cx = rect.left + rect.width / 2;
          var cy = rect.top + rect.height / 2;
          var big = n > 10;
          for (var i = 0; i < n; i++) {
            var h = document.createElement("div");
            h.className = "love-mini-heart" + (big ? " big-burst" : "");
            h.textContent = "♥";
            var angle = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.9;
            var dist = (big ? 70 : 44) + Math.random() * (big ? 110 : 44);
            h.style.setProperty("--dx", Math.cos(angle) * dist + "px");
            h.style.setProperty("--dy", Math.sin(angle) * dist + "px");
            h.style.left = cx - 9 + "px";
            h.style.top = cy - 9 + "px";
            document.body.appendChild(h);
            h.addEventListener("animationend", function () {
              if (h.parentNode) h.parentNode.removeChild(h);
            });
          }
        },
      };

      // ============================================================
      // ИНИЦИАЛИЗАЦИЯ
      // ============================================================
      // ============================================================
      // ИНТРО
      // ============================================================
      function playTypeClick() {
        try {
          var ctx = getAudioCtx();
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = "square";
          osc.frequency.setValueAtTime(
            700 + Math.random() * 300,
            ctx.currentTime,
          );
          gain.gain.setValueAtTime(0.055, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.001,
            ctx.currentTime + 0.038,
          );
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.038);
        } catch (e) {}
      }

      async function runIntro() {
        var l1 = document.getElementById("intro-line1");
        var l2 = document.getElementById("intro-line2");
        var l3 = document.getElementById("intro-line3");
        var btn = document.getElementById("intro-btn");

        async function type(el, text) {
          el.textContent = "";
          for (var i = 0; i < text.length; i++) {
            el.textContent = text.slice(0, i + 1) + "|";
            playTypeClick();
            await wait(65);
          }
          el.textContent = text;
        }

        await wait(500);
        await type(l1, data.names.to + "...");
        await wait(900);
        await type(l2, "У МЕНЯ ЕСТЬ ДЛЯ ТЕБЯ КОЕ-ЧТО...");
        await wait(900);
        await type(l3, "ГОТОВА СЫГРАТЬ?");
        await wait(300);
        btn.style.display = "inline-block";
      }

      // Запускается по тапу/клику на экране «НАЖМИ ЧТОБЫ НАЧАТЬ».
      // AudioContext должен быть создан/возобновлён внутри жеста пользователя,
      // иначе браузер заблокирует звук (автовоспроизведение запрещено).
      var _experienceStarted = false;
      function beginExperience() {
        if (_experienceStarted) return;
        _experienceStarted = true;
        var ctx = getAudioCtx();
        if (ctx.state === "suspended") ctx.resume();
        showScreen("intro-screen");
        runIntro();
      }

      function startFromIntro() {
        playBeep();
        var wipe = document.getElementById("scanline-wipe");
        wipe.classList.add("wiping");
        setTimeout(function () {
          showScreen("main-screen");
        }, 290);
        setTimeout(function () {
          wipe.classList.remove("wiping");
          checkChest(true);
        }, 590);
      }

      // ============================================================
      // СБРОС ПРОГРЕССА
      // ============================================================
      function resetProgress() {
        if (!confirm("Сбросить весь прогресс?\nВсе ключи будут потеряны."))
          return;
        localStorage.removeItem("loveQuestKeys");
        location.reload();
      }

      window.addEventListener("load", function () {
        loadProgress();
        document.getElementById("names-label").textContent =
          data.names.from + " → " + data.names.to;
        renderGameGrid();
        updateKeyCounter(false);
      });
    </script>

    <!-- ===========================================================
     ФИНАЛЬНЫЙ ЭКРАН — СУНДУК (fixed overlay)
     =========================================================== -->
    <div id="chest-finale-screen" aria-live="polite">
      <div class="stars-bg" id="stars-bg"></div>
      <div class="chest-finale-inner">
        <div class="finale-chest-icon" id="finale-chest-icon">🗝️</div>
        <div class="finale-content" id="finale-content" style="display: none">
          <p class="finale-message" id="finale-message"></p>
          <div id="finale-video-wrap"></div>
          <p class="finale-names-row" id="finale-names"></p>
          <button
            class="reset-btn"
            onclick="resetProgress()"
            style="margin-top: 40px"
          >
            СБРОСИТЬ ПРОГРЕСС
          </button>
        </div>
      </div>
    </div>
  </body>
